<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>КИБЕРПАНК 7 | ОГРОМНАЯ цифра | Лаги видео</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #000000;  /* абсолютно черный фон, никогда не меняется */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Контейнер для цифры — на всю ширину экрана */
        .glitch-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
        }

        /* 
          ОСНОВНАЯ ЦИФРА 7 — ОГРОМНАЯ, на всю высоту экрана.
          Используем clamp + vw/vh, чтобы цифра занимала максимальное пространство.
          Шрифт — строго рубленый, без скруглений: 'Courier New' в жирном начертании
          дает идеально прямые углы. Дополнительно отключаем сглаживание.
        */
        .digit-seven {
            font-family: 'Courier New', 'Fira Code', 'IBM Plex Mono', monospace;
            font-weight: 900;
            font-size: 70vh;      /* ОГРОМНАЯ — почти во всю высоту экрана */
            color: #ff0000;
            background: transparent;
            text-shadow: none;
            line-height: 1;
            letter-spacing: 0;
            font-style: normal;
            /* Жесткая отрисовка без сглаживания для максимально рубленого вида */
            -webkit-font-smoothing: none;
            font-smooth: never;
            text-rendering: geometricPrecision;
            /* Центрирование */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Адаптация для очень широких экранов — чтобы не вылезала за пределы */
        @media (min-aspect-ratio: 1/1) {
            .digit-seven {
                font-size: 70vw;  /* на широких экранах используем ширину */
            }
        }

        /* Для мобильных — тоже огромная, но с небольшим отступом */
        @media (max-width: 700px) {
            .digit-seven {
                font-size: 60vw;
            }
        }

        /* 
          СЛОИ ДЛЯ ЭФФЕКТА "ЛАГАЮЩЕГО ВИДЕО" (киберпанк-стайл)
          Несколько копий цифры, которые будут резко появляться, смещаться,
          создавать артефакты, "рваный кадр" и цветовую аберрацию.
          Размер шрифта наследуется от основного через em или абсолютно такой же.
        */
        .glitch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', 'Fira Code', 'IBM Plex Mono', monospace;
            font-weight: 900;
            font-size: 70vh;      /* такой же огромный размер */
            background: transparent;
            pointer-events: none;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-aspect-ratio: 1/1) {
            .glitch-layer {
                font-size: 70vw;
            }
        }

        @media (max-width: 700px) {
            .glitch-layer {
                font-size: 60vw;
            }
        }

        /* 
          ========== КИБЕРПАНК-ЭФФЕКТЫ ЛАГА (как будто видео глючит) ==========
          Резкие сдвиги, разрывы кадра, "битые пиксели", цветные тени.
        */

        /* Сдвиг кадра влево с разрывом (loss of sync) */
        .glitch-shift-left {
            transform: translate(-5%, 0);
            opacity: 0.95;
            visibility: visible;
            clip-path: inset(5% 0 15% 0);
        }

        /* Сдвиг вправо + синий/красный ореол (аберрация) */
        .glitch-aberration {
            transform: translate(6%, 1%);
            opacity: 0.9;
            visibility: visible;
            text-shadow: -0.04em 0 #00ffff, 0.04em 0 #ff00ff;
        }

        /* Горизонтальный разрыв кадра (как при повреждении видеопотока) */
        .glitch-horizontal-tear {
            transform: translate(2%, -1%);
            opacity: 0.95;
            visibility: visible;
            clip-path: inset(12% 0 28% 0);
        }

        /* "Застывший" кадр с наложением */
        .glitch-frozen-frame {
            transform: translate(-3%, 1%) skewX(2deg);
            opacity: 0.9;
            visibility: visible;
            filter: contrast(1.6) brightness(1.2);
        }

        /* Эффект "битых пикселей" — множественные полосы */
        .glitch-pixel-shatter {
            transform: translate(3%, -0.5%);
            opacity: 0.9;
            visibility: visible;
            clip-path: polygon(0% 0%, 100% 0%, 100% 8%, 0% 8%, 0% 22%, 100% 22%, 100% 36%, 0% 36%, 0% 58%, 100% 58%, 100% 72%, 0% 72%, 0% 86%, 100% 86%);
        }

        /* "Дрожание" кадра (вибрация видео) */
        .glitch-vibration {
            transform: translate(1%, -2%);
            opacity: 0.85;
            visibility: visible;
            animation: videoShake 0.06s infinite;
        }

        @keyframes videoShake {
            0% { transform: translate(0%, 0%); }
            25% { transform: translate(-2%, 1%); }
            50% { transform: translate(3%, -1%); }
            75% { transform: translate(-1%, -0.5%); }
            100% { transform: translate(2%, 1.5%); }
        }

        /* Потеря синхронизации — половинчатый кадр */
        .glitch-sync-loss {
            transform: translate(-3%, 0);
            opacity: 0.7;
            visibility: visible;
            clip-path: inset(0 0 50% 0);
        }

        /* Цифровые артефакты (зеленый/пурпурный оттенок) */
        .glitch-digital-artifact {
            transform: translate(4%, -1%);
            opacity: 0.9;
            visibility: visible;
            text-shadow: -0.03em 0 #0f0, 0.03em 0 #f0f;
        }

        /* Сжатие кадра (эффект "сжатого видео") */
        .glitch-squeeze-frame {
            transform: scaleX(0.88) translate(6%, 0);
            opacity: 0.9;
            visibility: visible;
        }

        /* Резкий сдвиг с размытием (потеря фокуса) */
        .glitch-blur-shift {
            transform: translate(-4%, 2%);
            opacity: 0.8;
            visibility: visible;
            filter: blur(1.5px);
        }

        /* "Полоски" как при повреждении видеопамяти */
        .glitch-rain-lines {
            transform: translate(2%, -1%);
            opacity: 0.9;
            visibility: visible;
            background: repeating-linear-gradient(90deg, rgba(255,0,0,0.3) 0px, rgba(255,0,0,0.3) 3px, transparent 3px, transparent 12px);
            background-blend-mode: overlay;
            background-clip: text;
            -webkit-background-clip: text;
            color: #ff0000;
        }

        /* Наложение "призрака" предыдущего кадра */
        .glitch-ghost-frame {
            transform: translate(-3%, 2%);
            opacity: 0.85;
            visibility: visible;
            text-shadow: 0.06em 0 #ff0000, -0.03em 0 #ff6666;
        }

        /* Эффект "ряби" как на старом мониторе */
        .glitch-ripple-scan {
            transform: skewX(-3deg) translate(2%, -1%);
            opacity: 0.9;
            visibility: visible;
            clip-path: inset(5% 0 20% 0);
        }
        
        /* Сдвиг с инверсией (эффект поврежденного видеопотока) */
        .glitch-invert-shift {
            transform: translate(-5%, 1%);
            opacity: 0.85;
            visibility: visible;
            filter: invert(0.15);
            text-shadow: -0.05em 0 #ff4444, 0.05em 0 #ff0000;
        }

        /* 
          Эффекты для основной цифры (чтобы создать ощущение, что "видео" лагает целиком)
        */
        .main-glitch-shift {
            transform: translate(2%, -1%);
            transition: none;
        }
        .main-glitch-fade {
            opacity: 0.35;
        }
        .main-glitch-stretch {
            transform: scaleX(1.04) translate(-2%, 0);
        }
        .main-glitch-color {
            text-shadow: -0.03em 0 #0ff, 0.03em 0 #f0f;
        }
        .main-glitch-skew {
            transform: skewX(2deg) translate(-1%, 1%);
        }
    </style>
</head>
<body>

<div class="glitch-container">
    <!-- ОСНОВНАЯ ЦИФРА 7 — ОГРОМНАЯ, рубленая, без скруглений, похожа на обычную семерку -->
    <div class="digit-seven" id="mainDigit">7</div>
    
    <!-- 
      МНОЖЕСТВО ГЛИТЧ-СЛОЁВ (копии цифры 7)
      Создают эффект "лагающего видео": резкие сдвиги, разрывы кадра, артефакты.
    -->
    <div class="glitch-layer" id="glitch1">7</div>
    <div class="glitch-layer" id="glitch2">7</div>
    <div class="glitch-layer" id="glitch3">7</div>
    <div class="glitch-layer" id="glitch4">7</div>
    <div class="glitch-layer" id="glitch5">7</div>
    <div class="glitch-layer" id="glitch6">7</div>
    <div class="glitch-layer" id="glitch7">7</div>
    <div class="glitch-layer" id="glitch8">7</div>
    <div class="glitch-layer" id="glitch9">7</div>
    <div class="glitch-layer" id="glitch10">7</div>
    <div class="glitch-layer" id="glitch11">7</div>
    <div class="glitch-layer" id="glitch12">7</div>
</div>

<script>
    (function() {
        // Основная цифра
        const mainDigit = document.getElementById('mainDigit');
        
        // Коллекция глитч-слоёв
        const glitchLayers = [
            document.getElementById('glitch1'),
            document.getElementById('glitch2'),
            document.getElementById('glitch3'),
            document.getElementById('glitch4'),
            document.getElementById('glitch5'),
            document.getElementById('glitch6'),
            document.getElementById('glitch7'),
            document.getElementById('glitch8'),
            document.getElementById('glitch9'),
            document.getElementById('glitch10'),
            document.getElementById('glitch11'),
            document.getElementById('glitch12')
        ];
        
        // Список киберпанк-эффектов (лагающее видео)
        const glitchEffects = [
            'glitch-shift-left',
            'glitch-aberration',
            'glitch-horizontal-tear',
            'glitch-frozen-frame',
            'glitch-pixel-shatter',
            'glitch-vibration',
            'glitch-sync-loss',
            'glitch-digital-artifact',
            'glitch-squeeze-frame',
            'glitch-blur-shift',
            'glitch-rain-lines',
            'glitch-ghost-frame',
            'glitch-ripple-scan',
            'glitch-invert-shift'
        ];
        
        // Эффекты для основной цифры (усиление лага)
        const mainEffects = [
            'main-glitch-shift',
            'main-glitch-fade',
            'main-glitch-stretch',
            'main-glitch-color',
            'main-glitch-skew'
        ];
        
        // Функция полной очистки всех глитчей (возвращаем идеальное состояние)
        function clearAllGlitches() {
            // Сбрасываем все глитч-слои
            for (let layer of glitchLayers) {
                if (layer) {
                    layer.className = 'glitch-layer';
                    layer.style.opacity = '';
                    layer.style.visibility = '';
                    layer.style.transform = '';
                    layer.style.filter = '';
                    layer.style.clipPath = '';
                    layer.style.textShadow = '';
                    layer.style.background = '';
                    layer.style.color = '';
                }
            }
            // Убираем искажения с основной цифры
            if (mainDigit) {
                for (let effect of mainEffects) {
                    mainDigit.classList.remove(effect);
                }
                mainDigit.style.transform = '';
                mainDigit.style.opacity = '';
                mainDigit.style.textShadow = '';
                mainDigit.style.filter = '';
            }
        }
        
        // Применяем эффект к глитч-слою
        function applyEffectToLayer(layer, effectClass) {
            if (!layer) return;
            layer.className = 'glitch-layer';
            layer.classList.add(effectClass);
            layer.style.visibility = 'visible';
            layer.style.opacity = '1';
        }
        
        let activeTimeout = null;
        
        // Функция создания "лагающего видео" эффекта (длительный глитч как при сбое видеопотока)
        function performVideoLag() {
            if (activeTimeout) {
                clearTimeout(activeTimeout);
                clearAllGlitches();
                activeTimeout = null;
            }
            
            // Количество одновременно "испорченных" слоёв: от 4 до 7 (интенсивный лаг для огромной цифры)
            const numLayers = Math.floor(Math.random() * 4) + 4; // 4,5,6,7
            // Перемешиваем слои
            const shuffled = [...glitchLayers];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const selectedLayers = shuffled.slice(0, numLayers);
            
            // Назначаем каждому слою случайный эффект лага
            for (let layer of selectedLayers) {
                const randomEffect = glitchEffects[Math.floor(Math.random() * glitchEffects.length)];
                applyEffectToLayer(layer, randomEffect);
            }
            
            // Почти всегда искажаем основную цифру (эффект "всё видео лагает")
            if (Math.random() < 0.85 && mainDigit) {
                const randomMain = mainEffects[Math.floor(Math.random() * mainEffects.length)];
                mainDigit.classList.add(randomMain);
                
                // Дополнительные настройки для некоторых эффектов
                if (randomMain === 'main-glitch-fade') {
                    mainDigit.style.opacity = '0.35';
                }
                if (randomMain === 'main-glitch-stretch') {
                    mainDigit.style.transform = 'scaleX(1.05) translateX(-3%)';
                }
                if (randomMain === 'main-glitch-color') {
                    mainDigit.style.textShadow = '-0.04em 0 #0ff, 0.04em 0 #f0f';
                }
                if (randomMain === 'main-glitch-skew') {
                    mainDigit.style.transform = 'skewX(2.5deg) translateX(-1.5%)';
                }
                if (randomMain === 'main-glitch-shift') {
                    mainDigit.style.transform = 'translate(2.5%, -1.5%)';
                }
            }
            
            // Дополнительный "взрыв" артефактов: у нескольких слоёв меняем цвет на киберпанк-оттенки
            for (let layer of selectedLayers) {
                if (Math.random() < 0.6) {
                    const neonColors = ['#ff0040', '#ff3300', '#ff0066', '#ff1a1a', '#ff4444', '#ff2200'];
                    const randomColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                    layer.style.color = randomColor;
                    // Сбросим после глитча (но общая очистка сделает это позже)
                    setTimeout(() => {
                        if (layer) layer.style.color = '';
                    }, 700);
                }
            }
            
            // Иногда добавляем "мерцание" как при потере синхронизации
            if (Math.random() < 0.5) {
                const flickerLayer = selectedLayers[0];
                if (flickerLayer) {
                    flickerLayer.style.animation = 'videoShake 0.04s infinite';
                    setTimeout(() => {
                        if (flickerLayer) flickerLayer.style.animation = '';
                    }, 600);
                }
            }
            
            // Дополнительный эффект: "заморозка" с наложением артефактов
            if (Math.random() < 0.4) {
                const freezeLayer = selectedLayers[Math.floor(Math.random() * selectedLayers.length)];
                if (freezeLayer) {
                    freezeLayer.style.filter = 'brightness(1.4) contrast(1.3)';
                    setTimeout(() => {
                        if (freezeLayer) freezeLayer.style.filter = '';
                    }, 500);
                }
            }
            
            // Длительность "лага" — как при зависании видео (800-1100 мс)
            const lagDuration = Math.floor(Math.random() * 300) + 800; // 800..1100 ms
            
            activeTimeout = setTimeout(() => {
                clearAllGlitches();
                activeTimeout = null;
            }, lagDuration);
        }
        
        // 
        // ОСНОВНОЙ ЦИКЛ: 
        // Огромная цифра идеальна ~6 секунд, затем ВИДЕО-ЛАГ на 0.8-1.1 секунды,
        // после чего снова идеальная картинка.
        // Эффект напоминает "зависание" или повреждение видеопотока в киберпанк-стиле.
        //
        let cycleTimeout = null;
        
        function startLagCycle() {
            if (cycleTimeout) clearTimeout(cycleTimeout);
            
            // Задержка ~6 секунд (с небольшим разбросом, чтобы не было роботизированно)
            const baseDelay = 6000;
            const variance = Math.floor(Math.random() * 600) - 300; // -300..+300
            const delay = Math.max(5600, baseDelay + variance);
            
            cycleTimeout = setTimeout(() => {
                performVideoLag();
                startLagCycle();
            }, delay);
        }
        
        // Запускаем цикл "киберпанк-лагов"
        startLagCycle();
        
        // Защита: если глитч завис — принудительно очищаем
        setInterval(() => {
            let anyActive = false;
            for (let layer of glitchLayers) {
                if (layer && layer.classList.length > 1) {
                    anyActive = true;
                    break;
                }
            }
            let mainActive = false;
            if (mainDigit) {
                for (let eff of mainEffects) {
                    if (mainDigit.classList.contains(eff)) {
                        mainActive = true;
                        break;
                    }
                }
            }
            if ((anyActive || mainActive) && !activeTimeout) {
                clearAllGlitches();
            }
        }, 300);
        
        // Изначально всё чисто
        clearAllGlitches();
        
        console.log('🔥 ОГРОМНАЯ киберпанк-семерка (рубленая, без скруглений). Эффект "лагающего видео" длится 800-1100 мс, каждые ~6 секунд.');
    })();
</script>

</body>
</html>
